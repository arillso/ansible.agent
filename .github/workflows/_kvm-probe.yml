---
name: KVM Probe
on:
    workflow_dispatch:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]
permissions:
    contents: read
jobs:
    probe:
        runs-on: ubuntu-latest
        steps:
            - name: Check /dev/kvm and acceleration
              run: |
                  echo "=== /dev/kvm presence ==="
                  if [ -e /dev/kvm ]; then ls -l /dev/kvm; echo "KVM_DEV=present"; else echo "KVM_DEV=absent"; fi
                  echo "=== cpu virt flags ==="
                  grep -oE 'vmx|svm' /proc/cpuinfo | sort -u || echo "no vmx/svm"
                  echo "=== try enable + kvm-ok ==="
                  sudo apt-get update -qq && sudo apt-get install -y -qq cpu-checker qemu-system-x86 >/dev/null 2>&1 || true
                  sudo usermod -aG kvm "$USER" || true
                  sg kvm -c 'kvm-ok' || kvm-ok || echo "kvm-ok failed"
