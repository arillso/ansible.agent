---
dependency:
    name: galaxy
    options:
        requirements-file: requirements.yml

driver:
    name: molecule-qemu

platforms:
    - name: alloy-ubuntu2204
      image_url: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
      image_checksum: sha256:https://cloud-images.ubuntu.com/jammy/current/SHA256SUMS
      image_arch: x86_64
      network_mode: user
      network_ssh_port: 2222
      network_ssh_user: ubuntu
      vm_cpus: 2
      vm_memory: 2048

    - name: alloy-debian12
      image_url: https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2
      image_checksum: sha512:https://cloud.debian.org/images/cloud/bookworm/latest/SHA512SUMS
      image_arch: x86_64
      network_mode: user
      network_ssh_port: 2223
      network_ssh_user: debian
      vm_cpus: 2
      vm_memory: 2048

provisioner:
    name: ansible
    config_options:
        defaults:
            interpreter_python: auto_silent
            callbacks_enabled: profile_tasks, timer
            stdout_callback: ansible.builtin.default
            result_format: yaml
    inventory:
        host_vars:
            alloy-ubuntu2204:
                # cloud images log in as `ubuntu`; the role needs root.
                ansible_become: true
            alloy-debian12:
                # debian cloud images log in as `debian`; the role needs root.
                ansible_become: true

verifier:
    name: ansible

scenario:
    name: default
    test_sequence:
        - dependency
        - cleanup
        - destroy
        - syntax
        - create
        - prepare
        - converge
        - idempotence
        - side_effect
        - verify
        - cleanup
        - destroy
