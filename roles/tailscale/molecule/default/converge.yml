---
# Molecule converge playbook for Tailscale role
- name: Converge
  hosts: all
  become: true

  pre_tasks:
      - name: Update apt cache (Debian/Ubuntu)
        ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600
        when: ansible_os_family == "Debian"

  roles:
      - role: arillso.agent.tailscale
        vars:
            # Install + configure, but skip `tailscale up`: with an empty
            # auth key the role installs the package and writes config
            # without authenticating (no valid auth key available in CI).
            tailscale_auth_key: ""

            # Skip connectivity verification
            tailscale_verify_connectivity: false

            # Basic settings for testing
            tailscale_accept_routes: true
            tailscale_ssh_enabled: false
